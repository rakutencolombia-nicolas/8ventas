<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>8Ventas.com — Ventas al por mayor · Bogotá</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #060e1a;
      font-family: 'Inter', Arial, sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 40%, #0d2a4a 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 60%, #0a1f35 0%, transparent 50%);
      animation: pulse 8s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes pulse {
      0%   { transform: scale(1) rotate(0deg); }
      100% { transform: scale(1.1) rotate(3deg); }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 600px;
      width: 100%;
      animation: fadeUp 0.9s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-size: clamp(42px, 10vw, 80px);
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 0.3rem;
    }

    .logo span.eight { color: #ffffff; }
    .logo span.ventas { color: #3b8fd4; }
    .logo span.dot { color: #25D366; }
    .logo span.com {
      color: #25D366;
      font-size: 0.55em;
      vertical-align: super;
      letter-spacing: 0;
    }

    .tagline {
      font-size: 13px;
      letter-spacing: 4px;
      color: #4a7a9b;
      text-transform: uppercase;
      margin-bottom: 3.5rem;
      font-weight: 400;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, #3b8fd4, #25D366);
      margin: 0 auto 3.5rem;
      border-radius: 2px;
    }

    .info-cards {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 1rem 1.4rem;
      flex: 1;
      min-width: 130px;
      max-width: 180px;
      transition: background 0.3s, transform 0.3s;
      cursor: default;
    }

    .card:hover {
      background: rgba(255,255,255,0.08);
      transform: translateY(-4px);
    }

    .card-icon { font-size: 22px; margin-bottom: 0.4rem; }
    .card-label {
      font-size: 11px;
      color: #4a7a9b;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.3rem;
    }
    .card-value { font-size: 14px; color: #c8dff0; font-weight: 600; }

    .wa-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #25D366;
      color: #fff;
      text-decoration: none;
      padding: 18px 40px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: transform 0.2s, background 0.2s;
      animation: glow 2.5s ease-in-out infinite;
      margin-bottom: 1rem;
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(37,211,102,0.4); }
      50%       { box-shadow: 0 0 0 12px rgba(37,211,102,0); }
    }

    .wa-btn:hover { background: #1ebe5d; transform: scale(1.05); }
    .wa-btn:active { transform: scale(0.98); }

    .hint { font-size: 12px; color: #2a5a72; margin-top: 0.5rem; }

    .footer { margin-top: 4rem; font-size: 11px; color: #1e3a50; letter-spacing: 1px; }
  </style>
</head>
<body>
  <div class="container">

    <div class="logo">
      <span class="eight">8</span><span class="ventas">Ventas</span><span class="dot">.</span><span class="com">com</span>
    </div>
    <p class="tagline">Distribución mayorista · Colombia</p>
    <div class="divider"></div>

    <div class="info-cards">

      <div class="card">

      <div class="card">

        <div class="card-value">Inmediata</div>

    </div>
